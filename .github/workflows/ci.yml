name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Python NLP: lint + unit tests + API tests ─────────────────────────────
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml/mock_api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          APP_API_KEY: test_key
          JWT_SECRET: test_secret_32chars_long_enough!
          ALLOWED_PHONES: "+79000000000"
          ALLOWED_PINS: "1111:vitya,2222:olga,3333:artyom"
          DEEPSEEK_API_KEY: ""
        run: pytest test_regex_parse.py test_api.py -v --tb=short

  # ─── Android: build debug APK ─────────────────────────────────────────────
  build-android:
    name: Android build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
